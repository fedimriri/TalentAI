services:
  talentai:
    container_name: talentai
    image: talentai
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MongoSettings__ConnectionString=mongodb://user:pass@mongodb:27017/?authSource=admin
    networks:
      - mongo_net

  mongodb:
    image: mongodb/mongodb-community-server
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=pass
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
    - mongo_net
  express:
    image: mongo-express
    container_name: express  
    environment:
        - ME_CONFIG_MONGODB_ADMINUSERNAME=user
        - ME_CONFIG_MONGODB_ADMINPASSWORD=pass
        - ME_CONFIG_MONGODB_SERVER=mongodb
        - ME_CONFIG_BASICAUTH_USERNAME=user
        - ME_CONFIG_BASICAUTH_PASSWORD=pass
    ports:
        - "8081:8081"
    depends_on:
        - mongodb
    networks:
    - mongo_net

volumes:
  mongo-data:

networks:
  mongo_net:
    external: false
    name: mongo_net


